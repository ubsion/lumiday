  <body class="subpage">
    <header class="site-header">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="assets/lumiday-logo.png" alt="" width="34" height="34">
          <span class="brand-copy">
            <strong>Lumiday</strong>
            <small data-i18n="brandChinese">闪光日子</small>
          </span>
        </a>
        <div class="nav-links">
          <a href="index.html#features" data-i18n="navFeatures">功能</a>
          <a href="index.html#privacy" data-i18n="navPrivacy">隐私</a>
          <a href="index.html#faq" data-i18n="navFaq">常见问题</a>
          <a href="privacy.html" data-i18n="privacyPolicy" data-locale-route="privacy">隐私政策</a>
        </div>
      </nav>
    </header>
    <main class="page-main">
      <section class="page-card">
        <p class="eyebrow" data-i18n="supportEyebrow">Lumiday / 闪光日子</p>
        <h1 data-i18n="supportPageTitle">Lumiday 支持</h1>
        <p data-i18n="supportProductLabel">产品名称：Lumiday / 闪光日子</p>
        <p data-i18n="supportIntro">如果你在使用 Lumiday 时遇到问题，或者想分享建议，欢迎通过邮件联系我们。</p>
        <a class="text-link" href="mailto:feedback.glowdays@outlook.com">feedback.glowdays@outlook.com</a>
      </section>

      <section class="page-card">
        <h2 data-i18n="supportFaqTitle">常见问题</h2>
        <div class="simple-list">
          <article>
            <h3 data-i18n="supportFaqQ1">支持离线使用吗？</h3>
            <p data-i18n="supportFaqA1">支持。Lumiday 的核心功能可以离线使用。</p>
          </article>
          <article>
            <h3 data-i18n="supportFaqQ2">需要注册账号吗？</h3>
            <p data-i18n="supportFaqA2">不需要。打开应用即可直接记录重要日子。</p>
          </article>
          <article>
            <h3 data-i18n="supportFaqQ3">数据会被上传吗？</h3>
            <p data-i18n="supportFaqA3">不会。你的应用数据只保存在你的设备中。</p>
          </article>
          <article>
            <h3 data-i18n="supportFaqQ4">支持小组件吗？</h3>
            <p data-i18n="supportFaqA4">支持。Lumiday 提供多种尺寸的小组件。</p>
          </article>
        </div>
      </section>

      <nav class="page-links" aria-label="Support links">
        <a href="index.html" data-i18n="backHome">返回首页</a>
        <a href="privacy.html" data-i18n="privacyPolicy" data-locale-route="privacy">隐私政策</a>
